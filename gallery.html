<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeri — Galeri Seni Atar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-gallery">

  <!-- Sidebar overlay (populated by nav.js) -->
  <div id="sidebar-overlay" role="dialog" aria-label="Navigation menu"></div>

  <!-- Top Navigation Bar -->
  <nav class="top-nav">
    <button class="nav-menu-btn" onclick="openSidebar()" aria-label="Open menu">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <!-- Category name is injected by gallery.js -->
    <span class="nav-brand" id="gallery-nav-title">Galeri</span>
  </nav>

  <!-- Sticky Search Bar -->
  <div class="search-bar-wrap">
    <div class="search-input-wrap">
      <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/>
        <path d="M21 21l-4.35-4.35"/>
      </svg>
      <input
        class="search-input"
        type="search"
        id="gallery-search"
        placeholder="Cari karya..."
        autocomplete="off"
      >
    </div>
  </div>

  <!-- 2-column grid (populated by gallery.js) -->
  <main class="gallery-grid" id="gallery-grid"></main>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/gallery.js"></script>

</body>
</html>
